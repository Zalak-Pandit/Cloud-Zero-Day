services:
  - type: web
    name: cloudsentinel-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANOMALY_THRESHOLD
        value: "0.72"
      - key: CRITICAL_THRESHOLD
        value: "0.90"
      - key: MODEL_PATH
        value: "./models"
      - key: DEBUG
        value: "false"

  - type: web
    name: cloudsentinel-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://cloudsentinel-backend.onrender.com