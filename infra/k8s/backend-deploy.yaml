apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudsentinel-backend
  namespace: cloudsentinel
  labels:
    app: backend
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: YOUR_ECR_REPO/cloudsentinel-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cloudsentinel-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: cloudsentinel-secrets
                  key: redis-url
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: cloudsentinel-config
                  key: kafka-servers
            - name: MODEL_PATH
              value: /app/models
            - name: AWS_REGION
              value: us-east-1
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: models-cache
              mountPath: /app/models
      volumes:
        - name: models-cache
          emptyDir: {}
      initContainers:
        - name: download-models
          image: amazon/aws-cli:latest
          command:
            - sh
            - -c
            - aws s3 sync s3://$(MODEL_BUCKET)/models /app/models || echo "No pre-trained models found"
          env:
            - name: MODEL_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: cloudsentinel-config
                  key: models-bucket
          volumeMounts:
            - name: models-cache
              mountPath: /app/models

---
apiVersion: v1
kind: Service
metadata:
  name: cloudsentinel-backend
  namespace: cloudsentinel
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: cloudsentinel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloudsentinel-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80